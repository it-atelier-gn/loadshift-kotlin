product: jvm/lib

settings:
  publishing:
    enabled: true
    group: io.github.it-atelier-gn
    version: 0.4.0
  kotlin:
    serialization: json

repositories:
  - id: mavenLocal
    url: mavenLocal
    resolve: false
    publish: true

dependencies:
  - ../loadshift-core
  - $libs.kotlinx.coroutines.core
  - $libs.kotlinx.datetime
  - $libs.kotlinx.serialization.json
  - org.xerial:sqlite-jdbc:3.46.1.3

test-dependencies:
  - $libs.kotlinx.coroutines.test
