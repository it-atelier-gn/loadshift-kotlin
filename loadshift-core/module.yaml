product: jvm/lib

settings:
  publishing:
    enabled: true
    group: io.github.it-atelier-gn
    version: 0.4.0
  kotlin:
    serialization: json

repositories:
  - id: mavenLocal
    url: mavenLocal
    resolve: false
    publish: true

dependencies:
  - $libs.kotlinx.coroutines.core:
      exported: true
  - $libs.kotlinx.datetime:
      exported: true
  - $libs.kotlinx.serialization.json:
      exported: true
  - org.camunda.bpm.model:camunda-bpmn-model:7.24.0:
      exported: true

test-dependencies:
  - $libs.kotlinx.coroutines.test
